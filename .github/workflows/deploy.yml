name: Deploy to Coolify
on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          curl -X POST http://89.167.113.127:8000/webhooks/source/github/events/manual \
            -H "Content-Type: application/json" \
            -d '{"ref":"refs/heads/main"}'
 